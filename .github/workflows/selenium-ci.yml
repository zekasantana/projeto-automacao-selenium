name: Selenium CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  selenium-tests:
    name: Executar testes Selenium
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Exibir versões do ambiente
        run: |
          java -version
          mvn -version
          google-chrome --version

      - name: Executar testes automatizados no Chrome
        run: mvn clean test -Dbrowser=chrome -Dheadless=true

      - name: Publicar resultados do Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn
          retention-days: 7

      - name: Publicar relatórios do Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn
          retention-days: 7