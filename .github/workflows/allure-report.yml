name: Allure Report

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: selenium-demo-web-shop
  cancel-in-progress: false

jobs:
  allure-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Executar testes
        run: mvn -B clean test -Dheadless=true -Dbrowser=chrome

      - name: Verificar se a branch gh-pages existe
        if: always()
        id: verificar-gh-pages
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "existe=true" >> "$GITHUB_OUTPUT"
          else
            echo "existe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Recuperar histórico do Allure
        if: always() && steps.verificar-gh-pages.outputs.existe == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Preparar diretório na primeira publicação
        if: always() && steps.verificar-gh-pages.outputs.existe == 'false'
        shell: bash
        run: mkdir -p gh-pages

      - name: Gerar relatório Allure
        if: always()
        uses: simple-elf/allure-report-action@v1.14
        with:
          gh_pages: gh-pages
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Publicar relatório no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history